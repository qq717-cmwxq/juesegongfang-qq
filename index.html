<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻梦酒馆 - 角色灵感管理</title>
    <style>
        :root {
            --pink-light: #ffebf2;
            --pink-main: #f8bbd0;
            --pink-dark: #f06292;
            --blue-light: #e3f2fd;
            --blue-main: #90caf9;
            --blue-dark: #42a5f5;
            --bg-gradient: linear-gradient(135deg, #fce4ec 0%, #e3f2fd 100%);
            --glass: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'PingFang SC', sans-serif; }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            color: #555;
            padding-bottom: 50px;
        }

        /* Header Styles */
        header {
            padding: 30px 20px;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            color: var(--pink-dark);
            font-size: 1.8rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .nav-btns {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-primary { background: var(--pink-main); color: white; }
        .btn-primary:hover { background: var(--pink-dark); transform: translateY(-2px); }
        .btn-secondary { background: var(--blue-main); color: white; }
        .btn-secondary:hover { background: var(--blue-dark); transform: translateY(-2px); }

        /* Character Grid */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px;
        }

        #home-view, #detail-view {
            animation: fadeIn 0.5s ease;
        }

        .char-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        .char-card {
            background: var(--glass);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .char-card:hover {
            transform: scale(1.05);
            border-color: var(--pink-main);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .char-card.highlight {
            animation: pulse 0.5s infinite alternate;
            border: 3px solid var(--pink-dark);
        }

        .char-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
            border: 3px solid white;
        }

        .char-name {
            font-weight: bold;
            color: #444;
            margin-bottom: 5px;
        }

        .del-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255,0,0,0.1);
            color: #ff5252;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0;
            transition: 0.3s;
        }

        .char-card:hover .del-btn { opacity: 1; }

        /* Detail View */
        .back-nav {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .detail-header {
            background: var(--glass);
            padding: 20px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .detail-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--blue-main); }

        /* Thought Section */
        .thought-form {
            background: var(--glass);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 15px;
            resize: none;
            margin-bottom: 10px;
            outline: none;
        }

        .image-preview {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }

        .thought-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .thought-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            position: relative;
        }

        .thought-time { font-size: 0.8rem; color: #aaa; margin-bottom: 8px; }

        .thought-img {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            display: block;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #ddd; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { from { transform: scale(1.0); } to { transform: scale(1.05); } }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header>
        <h1>✨ 幻梦角色工坊 ✨</h1>
        <div class="nav-btns">
            <button class="btn btn-primary" onclick="openModal()">➕ 新建角色</button>
            <button class="btn btn-secondary" onclick="randomPick()">🎲 随机抽卡</button>
        </div>
    </header>

    <div class="container">
        <!-- Home View -->
        <div id="home-view">
            <div class="char-grid" id="char-grid">
                <!-- Characters will be loaded here -->
            </div>
        </div>

        <!-- Detail View -->
        <div id="detail-view" class="hidden">
            <div class="back-nav">
                <button class="btn btn-secondary" onclick="showHome()">← 返回列表</button>
            </div>
            <div id="detail-content">
                <!-- Detail content will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Add Character Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom:20px; color: var(--pink-dark);">新建角色卡</h3>
            <div class="form-group">
                <label>角色姓名</label>
                <input type="text" id="new-name" placeholder="请输入角色名...">
            </div>
            <div class="form-group">
                <label>上传头像</label>
                <input type="file" id="new-avatar" accept="image/*">
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-primary" style="flex:1" onclick="addCharacter()">确认</button>
                <button class="btn" style="flex:1; background:#eee;" onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        let characters = JSON.parse(localStorage.getItem('tavern_chars')) || [];
        let currentId = null;

        // Initialize
        function init() {
            renderCharGrid();
        }

        // --- Data Storage ---
        function saveToLocal() {
            localStorage.setItem('tavern_chars', JSON.stringify(characters));
        }

        // --- Navigation ---
        function showHome() {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('detail-view').classList.add('hidden');
            currentId = null;
            renderCharGrid();
        }

        function showDetail(id) {
            currentId = id;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            renderDetail();
        }

        // --- Character Management ---
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        async function addCharacter() {
            const name = document.getElementById('new-name').value;
            const avatarFile = document.getElementById('new-avatar').files[0];
            
            if (!name) return alert('请输入名字');
            
            let avatarBase64 = 'https://via.placeholder.com/100'; // Default
            if (avatarFile) {
                avatarBase64 = await toBase64(avatarFile);
            }

            const newChar = {
                id: Date.now(),
                name: name,
                avatar: avatarBase64,
                thoughts: []
            };

            characters.push(newChar);
            saveToLocal();
            renderCharGrid();
            closeModal();
            document.getElementById('new-name').value = '';
        }

        function deleteCharacter(e, id) {
            e.stopPropagation();
            if(confirm('确定要删除这个角色吗？相关记录也会消失哦！')) {
                characters = characters.filter(c => c.id !== id);
                saveToLocal();
                renderCharGrid();
            }
        }

        // --- Random Pick ---
        function randomPick() {
            if (characters.length === 0) return alert('先创建一些角色吧！');
            
            const cards = document.querySelectorAll('.char-card');
            let count = 0;
            let maxTurns = 15;
            let lastIdx = -1;

            const interval = setInterval(() => {
                if (lastIdx !== -1) cards[lastIdx].classList.remove('highlight');
                let newIdx = Math.floor(Math.random() * cards.length);
                cards[newIdx].classList.add('highlight');
                lastIdx = newIdx;
                
                count++;
                if (count > maxTurns) {
                    clearInterval(interval);
                    setTimeout(() => {
                        alert(`✨ 命运选中了：${characters[newIdx].name}！`);
                        showDetail(characters[newIdx].id);
                    }, 300);
                }
            }, 100);
        }

        // --- Thought Management ---
        async function submitThought(id) {
            const text = document.getElementById('thought-text').value;
            const imgFile = document.getElementById('thought-img-input').files[0];
            
            if (!text && !imgFile) return;

            let imgBase64 = '';
            if (imgFile) imgBase64 = await toBase64(imgFile);

            const charIndex = characters.findIndex(c => c.id === id);
            characters[charIndex].thoughts.unshift({
                tid: Date.now(),
                text: text,
                image: imgBase64,
                time: new Date().toLocaleString()
            });

            saveToLocal();
            renderDetail();
        }

        function deleteThought(tid) {
            const charIndex = characters.findIndex(c => c.id === currentId);
            characters[charIndex].thoughts = characters[charIndex].thoughts.filter(t => t.tid !== tid);
            saveToLocal();
            renderDetail();
        }

        // --- Rendering ---
        function renderCharGrid() {
            const grid = document.getElementById('char-grid');
            grid.innerHTML = characters.map(c => `
                <div class="char-card" onclick="showDetail(${c.id})">
                    <button class="del-btn" onclick="deleteCharacter(event, ${c.id})">✖</button>
                    < img src="${c.avatar}" class="char-avatar">
                    <div class="char-name">${c.name}</div>
                    <div style="font-size: 0.7rem; color: #999;">${c.thoughts.length} 条灵感</div>
                </div>
            `).join('');
        }

        function renderDetail() {
            const char = characters.find(c => c.id === currentId);
            const detailContent = document.getElementById('detail-content');
            
            detailContent.innerHTML = `
                <div class="detail-header">
                    < img src="${char.avatar}" class="detail-avatar">
                    <div>
                        <h2>${char.name}</h2>
                        <p style="color: #888; font-size:0.9rem;">记录下你的奇思妙想...</p >
                    </div>
                </div>

                <div class="thought-form">
                    <textarea id="thought-text" placeholder="此时此刻的想法..."></textarea>
                    <div style="display:flex; justify-content: space-between; align-items:center;">
                        <input type="file" id="thought-img-input" accept="image/*" style="font-size:0.8rem;">
                        <button class="btn btn-primary" onclick="submitThought(${char.id})">发布灵感</button>
                    </div>
                </div>

                <div class="thought-list">
                    ${char.thoughts.map(t => `
                        <div class="thought-card">
                            <button class="del-btn" style="opacity:1" onclick="deleteThought(${t.tid})">✖</button>
                            <div class="thought-time">${t.time}</div>
                            <div class="thought-text">${t.text.replace(/\n/g, '<br>')}</div>
                            ${t.image ? `< img src="${t.image}" class="thought-img" onclick="window.open(this.src)">` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // --- Utils ---
        function toBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        init();
    </script>
</body>
</html>
