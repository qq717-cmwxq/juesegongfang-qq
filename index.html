<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻梦酒馆 Pro - 大容量版</title>
    <style>
        :root {
            --pink: #FFD1DC;
            --blue: #BDE0FE;
            --dark-pink: #FF91AF;
            --dark-blue: #A2D2FF;
            --bg: #fdfbff;
        }

        body {
            background: linear-gradient(135deg, var(--pink) 0%, var(--blue) 100%);
            background-attachment: fixed;
            margin: 0; min-height: 100vh;
            font-family: "Microsoft YaHei", sans-serif;
            color: #5a5a5a;
        }

        header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            padding: 20px; text-align: center;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 10;
        }

        .btn {
            padding: 10px 22px; border: none; border-radius: 25px;
            cursor: pointer; font-weight: bold; margin: 5px;
            transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-add { background-color: var(--dark-pink); color: white; }
        .btn-rand { background-color: var(--dark-blue); color: white; }
        .btn-back { background: white; color: #777; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }

        .container { max-width: 900px; margin: 20px auto; padding: 0 15px; }
        
        /* 角色网格 */
        .char-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .char-card {
            background: rgba(255, 255, 255, 0.9); border-radius: 20px; padding: 20px;
            text-align: center; position: relative; cursor: pointer;
            transition: 0.3s; border: 2px solid transparent;
        }
        .char-card:hover { border-color: var(--dark-pink); transform: scale(1.03); }

        .char-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            object-fit: cover; border: 4px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .char-name { margin-top: 12px; font-weight: bold; font-size: 18px; color: #444; }

        /* 详情页 */
        .detail-card { 
            background: rgba(255, 255, 255, 0.85); border-radius: 25px; 
            padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .thought-item {
            background: white; margin: 20px 0; padding: 20px;
            border-radius: 15px; position: relative; border-left: 5px solid var(--dark-blue);
        }
        .thought-img { 
            max-width: 100%; border-radius: 12px; margin-top: 15px; 
            display: block; cursor: zoom-in;
        }

        /* 模态框 */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(5px);
        }
        .modal-box { 
            background: white; padding: 30px; border-radius: 25px; 
            width: 85%; max-width: 350px; box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        input[type="text"], textarea {
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #eee; border-radius: 12px; background: #f9f9f9;
            box-sizing: border-box;
        }

        .del-btn { color: #ff7875; border: none; background: #fff1f0; padding: 5px 10px; border-radius: 10px; cursor: pointer; font-size: 12px; margin-top: 10px;}
        .hidden { display: none; }
        .highlight { border: 4px solid var(--dark-pink) !important; background: var(--pink) !important; }

        @keyframes bounce { 0%, 100% {transform: scale(1);} 50% {transform: scale(1.05);} }
        .animate-bounce { animation: bounce 0.4s infinite; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0 0 10px 0; color: #555; font-size: 24px;">✨ 幻梦角色工坊</h1>
    <button class="btn btn-add" onclick="showModal()">+ 新建角色</button>
    <button class="btn btn-rand" onclick="randomPick()">🎲 帮我选一张</button>
</header>

<div class="container">
    <div id="homeView">
        <div class="char-grid" id="charGrid"></div>
    </div>

    <div id="detailView" class="hidden">
        <button class="btn btn-back" onclick="goHome()">← 返回角色列表</button>
        <div class="detail-card">
            <div id="charHeader" style="text-align: center; margin-bottom: 20px;"></div>
            <div style="background: #f0f7ff; padding: 15px; border-radius: 15px;">
                <h4 style="margin:0 0 10px 0;">📝 记录灵感/截图</h4>
                <textarea id="thoughtText" placeholder="此时此刻想到了什么..."></textarea>
                <div style="font-size: 14px; margin-bottom: 10px;">
                    附带截图：<input type="file" id="thoughtFile" accept="image/*">
                </div>
                <button class="btn btn-add" id="saveThoughtBtn" onclick="addThought()">保存记录</button>
            </div>
            <div id="thoughtList"></div>
        </div>
    </div>
</div>

<div class="modal" id="modal">
    <div class="modal-box">
        <h3 style="margin-top:0">新建角色卡</h3>
        <input type="text" id="newName" placeholder="角色名字">
        <p style="font-size: 12px; color: #999;">上传一张好看的头像：</p >
        <input type="file" id="newAvatar" accept="image/*">
        <div style="margin-top: 25px; display: flex; gap: 10px;">
            <button class="btn btn-add" style="flex:1" onclick="createChar()">确定</button>
            <button class="btn" style="flex:1; background:#eee" onclick="hideModal()">取消</button>
        </div>
    </div>
</div>

<script>
    /** IndexedDB 数据库管理 **/
    let db;
    const DB_NAME = "TavernDB";
    const STORE_NAME = "Characters";

    const initDB = () => {
        return new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                db = e.target.result;
                db.createObjectStore(STORE_NAME, { keyPath: "id" });
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                resolve();
            };
        });
    };

    const getAllChars = () => {
        return new Promise((resolve) => {
            const transaction = db.transaction(STORE_NAME, "readonly");
            const store = transaction.objectStore(STORE_NAME);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result || []);
        });
    };

    const saveCharToDB = (char) => {
        return new Promise((resolve) => {
            const transaction = db.transaction(STORE_NAME, "readwrite");
            const store = transaction.objectStore(STORE_NAME);
            store.put(char);
            transaction.oncomplete = () => resolve();
        });
    };

    const deleteCharFromDB = (id) => {
        return new Promise((resolve) => {
            const transaction = db.transaction(STORE_NAME, "readwrite");
            const store = transaction.objectStore(STORE_NAME);
            store.delete(id);
            transaction.oncomplete = () => resolve();
        });
    };

    /** 业务逻辑 **/
    let activeCharId = null;

    async function refreshHome() {
        const chars = await getAllChars();
        const grid = document.getElementById('charGrid');
        grid.innerHTML = chars.length ? '' : '<p style="text-align:center; color:#999; grid-column:1/-1; margin-top:50px;">酒馆空荡荡的，快去创建角色吧~</p >';
        chars.forEach(char => {
            const div = document.createElement('div');
            div.className = 'char-card';
            div.id = 'card-' + char.id;
            div.onclick = () => showDetail(char.id);
            div.innerHTML = `
                < img src="${char.avatar || 'https://via.placeholder.com/100'}" class="char-avatar">
                <div class="char-name">${char.name}</div>
                <button class="del-btn" onclick="deleteChar(event, ${char.id})">删除角色</button>
            `;
            grid.appendChild(div);
        });
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    async function createChar() {
        const name = document.getElementById('newName').value;
        const file = document.getElementById('newAvatar').files[0];
        if (!name) return alert('起个名字吧~');

        let avatarData = "";
        if (file) {
            avatarData = await toBase64(file);
        }

        const newChar = {
            id: Date.now(),
            name: name,
            avatar: avatarData,
            thoughts: []
        };

        await saveCharToDB(newChar);
        hideModal();
        document.getElementById('newName').value = '';
        document.getElementById('newAvatar').value = '';
        refreshHome();
    }

    async function deleteChar(e, id) {
        e.stopPropagation();
        if (confirm('真的要让这位角色离开酒馆吗？')) {
            await deleteCharFromDB(id);
            refreshHome();
        }
    }

    async function showDetail(id) {
        activeCharId = id;
        const chars = await getAllChars();
        const char = chars.find(c => c.id === id);
        
        document.getElementById('homeView').classList.add('hidden');
        document.getElementById('detailView').classList.remove('hidden');
        document.getElementById('charHeader').innerHTML = `
            < img src="${char.avatar}" style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:5px solid white; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
            <h2 style="margin:10px 0;">${char.name}</h2>
        `;
        renderThoughts(char.thoughts);
        window.scrollTo(0,0);
    }

    function goHome() {
        document.getElementById('homeView').classList.remove('hidden');
        document.getElementById('detailView').classList.add('hidden');
        refreshHome();
    }

    async function addThought() {
        const text = document.getElementById('thoughtText').value;
        const file = document.getElementById('thoughtFile').files[0];
        if (!text && !file) return;

        const btn = document.getElementById('saveThoughtBtn');
        btn.innerText = "保存中...";
        btn.disabled = true;

        let imgData = "";
        if (file) imgData = await toBase64(file);

        const chars = await getAllChars();
        const char = chars.find(c => c.id === activeCharId);
        
        char.thoughts.unshift({
            tid: Date.now(),
            content: text,
            img: imgData,
            date: new Date().toLocaleString()
        });

        await saveCharToDB(char);
        
        btn.innerText = "保存记录";
        btn.disabled = false;
        document.getElementById('thoughtText').value = '';
        document.getElementById('thoughtFile').value = '';
        renderThoughts(char.thoughts);
    }

    function renderThoughts(thoughts) {
        const list = document.getElementById('thoughtList');
        list.innerHTML = thoughts.length ? '' : '<p style="text-align:center; color:#999; padding:30px;">还没有记录任何灵感...</p >';
        thoughts.forEach(t => {
            const item = document.createElement('div');
            item.className = 'thought-item';
            item.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                    <span style="font-size:12px; color:#bbb;">${t.date}</span>
                    <button class="del-btn" style="margin:0" onclick="deleteThought(${t.tid})">删除</button>
                </div>
                <div style="margin:10px 0; line-height:1.6; white-space:pre-wrap;">${t.content}</div>
                ${t.img ? `< img src="${t.img}" class="thought-img" onclick="window.open('${t.img}')">` : ''}
            `;
            list.appendChild(item);
        });
    }

    async function deleteThought(tid) {
        if (!confirm('删除这条记录？')) return;
        const chars = await getAllChars();
        const char = chars.find(c => c.id === activeCharId);
        char.thoughts = char.thoughts.filter(t => t.tid !== tid);
        await saveCharToDB(char);
        renderThoughts(char.thoughts);
    }

    async function randomPick() {
        const chars = await getAllChars();
        if (chars.length < 1) return alert('酒馆里还没有人哦！');
        
        const cards = document.querySelectorAll('.char-card');
        let count = 0;
        const timer = setInterval(() => {
            cards.forEach(c => c.classList.remove('highlight', 'animate-bounce'));
            const rand = Math.floor(Math.random() * cards.length);
            cards[rand].classList.add('highlight', 'animate-bounce');
            count++;
            if (count > 12) {
                clearInterval(timer);
                setTimeout(() => {
                    const finalChar = chars.find(c => 'card-'+c.id === cards[rand].id);
                    alert('✨ 命运的指引：今天玩 ' + finalChar.name + '！');
                    showDetail(finalChar.id);
                }, 300);
            }
        }, 80);
    }

    function toBase64(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
        });
    }

    // 初始化
    window.onload = async () => {
        await initDB();
        refreshHome();
    };
</script>

</body>
</html>
