<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻梦酒馆 - 角色灵感管理</title>
    <style>
        :root {
            --pink-light: #ffebf2;
            --pink-main: #f8bbd0;
            --pink-dark: #f06292;
            --blue-light: #e3f2fd;
            --blue-main: #90caf9;
            --blue-dark: #42a5f5;
            --bg-gradient: linear-gradient(135deg, #fce4ec 0%, #e3f2fd 100%);
            --glass: rgba(255, 255, 255, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'PingFang SC', sans-serif; }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            color: #555;
            padding-bottom: 50px;
        }

        header {
            padding: 30px 20px;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 { color: var(--pink-dark); font-size: 1.8rem; margin-bottom: 10px; letter-spacing: 2px; }

        .nav-btns { display: flex; justify-content: center; gap: 15px; }

        .btn {
            padding: 8px 20px; border: none; border-radius: 20px; cursor: pointer;
            transition: all 0.3s ease; font-weight: 600; display: flex; align-items: center; gap: 5px;
        }

        .btn-primary { background: var(--pink-main); color: white; }
        .btn-secondary { background: var(--blue-main); color: white; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 10px rgba(0,0,0,0.1); }

        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }

        .char-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .char-card {
            background: var(--glass); border-radius: 20px; padding: 15px;
            text-align: center; transition: 0.3s; border: 2px solid transparent;
            cursor: pointer; position: relative;
        }
        .char-card:hover { border-color: var(--pink-main); background: white; }

        .char-avatar {
            width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
            margin-bottom: 10px; border: 3px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .del-btn {
            position: absolute; top: 8px; right: 8px; background: #ffefef; color: #ff5252;
            border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 10px;
            cursor: pointer; opacity: 0; transition: 0.3s;
        }
        .char-card:hover .del-btn { opacity: 1; }

        /* Detail View */
        .detail-header {
            background: var(--glass); padding: 20px; border-radius: 25px;
            display: flex; align-items: center; gap: 20px; margin-bottom: 20px;
        }
        .detail-avatar { width: 70px; height: 70px; border-radius: 50%; border: 3px solid white; }

        .thought-form { background: var(--glass); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        textarea {
            width: 100%; height: 80px; padding: 12px; border: 1px solid #ddd;
            border-radius: 12px; resize: none; margin-bottom: 10px;
        }

        .thought-card {
            background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02); position: relative;
        }
        .thought-img { max-width: 100%; border-radius: 10px; margin-top: 10px; }

        /* Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; justify-content: center;
            align-items: center; z-index: 1000; backdrop-filter: blur(5px);
        }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 350px; }
        input[type="text"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; }

        .hidden { display: none; }
        .highlight { animation: pulse 0.4s infinite alternate; border: 3px solid var(--pink-dark) !important; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
    </style>
</head>
<body>

    <header>
        <h1>✨ 幻梦角色工坊 ✨</h1>
        <div class="nav-btns">
            <button class="btn btn-primary" onclick="openModal()">➕ 新建角色</button>
            <button class="btn btn-secondary" onclick="randomPick()">🎲 随机抽卡</button>
        </div>
    </header>

    <div class="container">
        <div id="home-view">
            <div class="char-grid" id="char-grid"></div>
        </div>

        <div id="detail-view" class="hidden">
            <button class="btn btn-secondary" style="margin-bottom: 20px;" onclick="showHome()">← 返回</button>
            <div id="detail-content"></div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--pink-dark)">新建角色卡</h3>
            <p style="font-size: 12px; color: #888; margin-top: 5px;">图片会自动压缩以节省空间</p >
            <input type="text" id="new-name" placeholder="角色姓名...">
            <input type="file" id="new-avatar" accept="image/*">
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-primary" style="flex:1" onclick="addCharacter()">确认</button>
                <button class="btn" style="flex:1; background:#eee;" onclick="closeModal()">取消</button>
            </div>
        </div>
    </div>

    <script>
        let characters = JSON.parse(localStorage.getItem('tavern_chars_v2')) || [];
        let currentId = null;

        function save() {
            try {
                localStorage.setItem('tavern_chars_v2', JSON.stringify(characters));
            } catch (e) {
                alert("存储失败！可能是图片太多或太大导致空间不足，请尝试删除部分内容。");
                console.error(e);
            }
        }

        // --- 图片压缩核心功能 ---
        function processImage(file, maxWidth = 400) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (ev) => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height = (maxWidth / width) * height;
                            width = maxWidth;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        // 转换成 0.7 质量的 jpeg，大幅度减少体积
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                };
            });
        }

        async function addCharacter() {
            const nameInput = document.getElementById('new-name');
            const fileInput = document.getElementById('new-avatar');
            
            if (!nameInput.value) return alert('请输入名字');
            
            let avatarBase64 = 'https://via.placeholder.com/100';
            if (fileInput.files[0]) {
                avatarBase64 = await processImage(fileInput.files[0], 200); // 头像压得更小
            }

            const newChar = {
                id: Date.now(),
                name: nameInput.value,
                avatar: avatarBase64,
                thoughts: []
            };

            characters.push(newChar);
            save();
            renderGrid();
            closeModal();
            nameInput.value = '';
            fileInput.value = '';
        }

        function deleteCharacter(e, id) {
            e.stopPropagation();
            if(confirm('确定删除吗？')) {
                characters = characters.filter(c => c.id !== id);
                save();
                renderGrid();
            }
        }

        async function submitThought(id) {
            const text = document.getElementById('thought-text').value;
            const imgFile = document.getElementById('thought-img-input').files[0];
            if (!text && !imgFile) return;

            let imgBase64 = '';
            if (imgFile) {
                imgBase64 = await processImage(imgFile, 800); // 截图保留稍高分辨率
            }

            const char = characters.find(c => c.id === id);
            char.thoughts.unshift({
                tid: Date.now(),
                text,
                image: imgBase64,
                time: new Date().toLocaleString()
            });

            save();
            renderDetail();
        }

        function deleteThought(tid) {
            const char = characters.find(c => c.id === currentId);
            char.thoughts = char.thoughts.filter(t => t.tid !== tid);
            save();
            renderDetail();
        }

        // --- UI 控制 ---
        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function showHome() { 
            document.getElementById('home-view').classList.remove('hidden'); 
            document.getElementById('detail-view').classList.add('hidden'); 
            renderGrid();
        }
        function showDetail(id) {
            currentId = id;
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            renderDetail();
        }

        function renderGrid() {
            const grid = document.getElementById('char-grid');
            grid.innerHTML = characters.map(c => `
                <div class="char-card" onclick="showDetail(${c.id})">
                    <button class="del-btn" onclick="deleteCharacter(event, ${c.id})">✕</button>
                    < img src="${c.avatar}" class="char-avatar">
                    <div style="font-weight:bold">${c.name}</div>
                </div>
            `).join('');
        }

        function renderDetail() {
            const char = characters.find(c => c.id === currentId);
            const content = document.getElementById('detail-content');
            content.innerHTML = `
                <div class="detail-header">
                    < img src="${char.avatar}" class="detail-avatar">
                    <h2>${char.name}</h2>
                </div>
                <div class="thought-form">
                    <textarea id="thought-text" placeholder="记录此刻的想法..."></textarea>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <input type="file" id="thought-img-input" accept="image/*">
                        <button class="btn btn-primary" onclick="submitThought(${char.id})">保存记录</button>
                    </div>
                </div>
                <div>
                    ${char.thoughts.map(t => `
                        <div class="thought-card">
                            <button class="del-btn" style="opacity:1" onclick="deleteThought(${t.tid})">✕</button>
                            <div style="font-size:12px; color:#999; margin-bottom:5px;">${t.time}</div>
                            <div style="white-space:pre-wrap;">${t.text}</div>
                            ${t.image ? `< img src="${t.image}" class="thought-img">` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function randomPick() {
            if (characters.length < 2) return alert('角色太少啦，多建几个再抽吧！');
            const cards = document.querySelectorAll('.char-card');
            let i = 0;
            const timer = setInterval(() => {
                cards.forEach(c => c.classList.remove('highlight'));
                cards[Math.floor(Math.random()*cards.length)].classList.add('highlight');
                if(i++ > 10) {
                    clearInterval(timer);
                    setTimeout(() => {
                        const winner = document.querySelector('.highlight');
                        winner.click();
                    }, 500);
                }
            }, 100);
        }

        renderGrid();
    </script>
</body>
</html>
